name: Verify shared main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_CONVEX_URL: https://festive-starfish-979.convex.cloud
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Strict TypeScript check
        run: npm run typecheck

      - name: Regression tests
        run: npm test

      - name: Production dashboard build
        run: npm run dashboard:build
